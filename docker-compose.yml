services:
  # ── PostgreSQL — ZeroLayer app database ──────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: zerolayer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zerolayer
      POSTGRES_PASSWORD: zerolayer_secret
      POSTGRES_DB: zerolayer_db
    ports:
      - "5432:5432"
    volumes:
      - zerolayer_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerolayer -d zerolayer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── TideCloak — Auth + E2EE ───────────────────────────────────────────────────
  tidecloak:
    image: tideorg/tidecloak-stg-dev:latest
    container_name: zerolayer-tidecloak
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: password
      KC_HOSTNAME: http://localhost:8080
      KC_HTTP_PORT: 8080
      KC_LOG_LEVEL: INFO
      KC_LOG_CONSOLE_COLOR: "true"
      # Staging ORKs (public Tide network — no setup required)
      SYSTEM_HOME_ORK: https://sork1.tideprotocol.com
      USER_HOME_ORK: https://sork1.tideprotocol.com
      THRESHOLD_T: 3
      THRESHOLD_N: 5
      PAYER_PUBLIC: 20000011d6a0e8212d682657147d864b82d10e92776c15ead43dcfdc100ebf4dcfe6a8
    # TideCloak uses embedded H2 on tmpfs — fast for dev, data resets on container remove
    tmpfs:
      - /opt/keycloak/data/h2:uid=1000,gid=1000
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'realm' && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  zerolayer_pg_data:
